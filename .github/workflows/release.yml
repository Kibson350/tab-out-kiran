name: Build & Release Safari Extension

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build macOS app (ad-hoc signed)
        run: |
          xcodebuild \
            -project "Tab Out/Tab Out.xcodeproj" \
            -scheme "Tab Out (macOS)" \
            -configuration Release \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            build

      - name: Create DMG
        run: |
          hdiutil create \
            -volname "Tab Out" \
            -srcfolder "build/Tab Out.app" \
            -ov -format UDZO \
            "build/TabOut.dmg"

      - name: Delete existing latest release
        run: gh release delete latest --yes 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        run: |
          gh release create latest \
            --title "Latest Build" \
            --notes "Auto-built from \`main\` — commit \`${{ github.sha }}\`" \
            --latest \
            "build/TabOut.dmg"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
